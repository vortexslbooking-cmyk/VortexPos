<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="vortexPOS — sistema de comandas para hostelería. Sala, cocina, reservas y caja. Funciona sin conexión.">
<!-- PWA: activos servidos por vortexPOS Cloud en /app/ (inofensivos al abrir como archivo) -->
<link rel="manifest" href="/app/manifest.webmanifest">
<link rel="apple-touch-icon" href="/app/icon-192.png">
<title>vortexPOS — Sala</title>
<style>
/* ============================================================
   TEMA: claro / oscuro / sistema
   Toda la interfaz se pinta con estas variables. El modo se controla con
   data-theme en <html>:  "light" | "dark"  (el modo "sistema" resuelve a uno
   de los dos según prefers-color-scheme). Cambiarlas repinta la app entera.
   ============================================================ */
:root, :root[data-theme="light"]{
  --bg:#0b1020; --bg2:#0f1730;                 /* barra lateral (siempre oscura) */
  --panel:#ffffff; --panel-2:#f4f6fb;
  --ink:#0f172a; --ink-soft:#475569; --muted:#94a3b8; --line:#e6eaf2;
  --brand:#2563eb; --brand-2:#06b6d4; --brand-ink:#eff6ff;
  --ok:#10b981; --warn:#f59e0b; --bad:#ef4444; --info:#6366f1;
  --free:#10b981; --busy:#2563eb; --resv:#f59e0b;
  --ok-bg:#dcfce7; --ok-tx:#166534; --warn-bg:#fef3c7; --warn-tx:#b45309;
  --bad-bg:#fee2e2; --bad-tx:#b91c1c; --info-bg:#e0e7ff; --info-tx:#4338ca;
  --neutral-bg:#f1f5f9; --neutral-tx:#64748b;
  --alert-bg:#fef2f2; --alert-tx:#dc2626; --soon-bg:#fffbeb; --soon-tx:#b45309;
  --barra-bg:#cffafe; --barra-tx:#0e7490; --tarjeta-bg:#dbeafe; --tarjeta-tx:#1e40af;
  --stepper-bg:#f1f5f9; --stepper-hover:#e2e8f0; --ghost-hover:#e9edf5;
  --scroll:#cbd5e1; --scroll-hover:#94a3b8;
  --shadow:0 10px 30px -12px rgba(15,23,42,.28);
  --shadow-sm:0 2px 8px -2px rgba(15,23,42,.14);
  --radius:18px; --radius-sm:12px;
  --sidebar-w:84px;
  font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
:root[data-theme="dark"]{
  --bg:#070b16; --bg2:#0b1226;
  --panel:#111a2e; --panel-2:#0a101f;
  --ink:#eaf0fb; --ink-soft:#aebbd4; --muted:#7386a5; --line:#1e2b45;
  --brand:#5b8dff; --brand-2:#38bdf8; --brand-ink:#152641;
  --ok:#3fca9a; --warn:#e0a94a; --bad:#f2726f; --info:#8b93ff;
  --free:#3fca9a; --busy:#5b8dff; --resv:#e0a94a;
  --ok-bg:#0e2a22; --ok-tx:#5fe0b0; --warn-bg:#2c2210; --warn-tx:#e9bf6a;
  --bad-bg:#2c1414; --bad-tx:#ff9b98; --info-bg:#1a1f3d; --info-tx:#a5adff;
  --neutral-bg:#151f33; --neutral-tx:#8fa1bd;
  --alert-bg:#2c1414; --alert-tx:#ff9b98; --soon-bg:#2c2210; --soon-tx:#e9bf6a;
  --barra-bg:#0e2b36; --barra-tx:#67d8ef; --tarjeta-bg:#152641; --tarjeta-tx:#93b4ff;
  --stepper-bg:#151f33; --stepper-hover:#1e2b45; --ghost-hover:#1b2740;
  --scroll:#26364f; --scroll-hover:#3a4d6c;
  --shadow:0 10px 30px -12px rgba(0,0,0,.6);
  --shadow-sm:0 2px 8px -2px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--panel-2);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;user-select:none;-webkit-user-select:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation}
svg{width:1em;height:1em;flex:none;vertical-align:-.12em}
input,select,textarea{font-family:inherit;font-size:15px;user-select:text;-webkit-user-select:text}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-hover);background-clip:content-box}

/* ---------- Layout ---------- */
/* 100dvh usa la altura VISIBLE real del móvil (descuenta la barra del navegador),
   evitando que la parte inferior quede oculta e inutilizable. 100vh es el respaldo. */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;height:100dvh}

/* ---------- Sidebar ---------- */
.sidebar{background:linear-gradient(180deg,var(--bg),var(--bg2));color:#cbd5e1;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:8px}
.brand{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;margin-bottom:14px;
  background:linear-gradient(135deg,var(--brand),var(--brand-2));box-shadow:0 8px 24px -6px rgba(37,99,235,.7)}
.brand svg{width:26px;height:26px}
.nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;flex:1}
.nav button{width:60px;height:60px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#94a3b8;transition:.16s;position:relative}
.nav button svg{width:22px;height:22px}
.nav button span{font-size:10px;font-weight:600;letter-spacing:.2px}
.nav button:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav button.active{background:rgba(37,99,235,.18);color:#fff}
.nav button.active::before{content:"";position:absolute;left:-16px;top:14px;bottom:14px;width:4px;border-radius:0 4px 4px 0;background:linear-gradient(180deg,var(--brand),var(--brand-2))}
.nav .badge{position:absolute;top:8px;right:8px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--bad);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center}
.clock{font-size:12px;font-weight:600;color:#64748b;margin-top:6px;text-align:center;line-height:1.3}

/* ---------- Main ---------- */
.main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:72px;flex:none;display:flex;align-items:center;gap:18px;padding:0 26px;background:var(--panel);border-bottom:1px solid var(--line)}
.topbar h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
.topbar .sub{font-size:13px;color:var(--muted);font-weight:500}
.topbar .spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:999px;background:var(--panel-2);font-size:13px;font-weight:600;color:var(--ink-soft)}
.pill b{color:var(--ink)}
.dot{width:8px;height:8px;border-radius:50%}
.view{flex:1;overflow:auto;padding:26px}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:12px;font-weight:700;font-size:14px;transition:.15s;white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 6px 16px -6px rgba(37,99,235,.6)}
.btn-primary:hover{filter:brightness(1.08)}
.btn-ghost{background:var(--panel-2);color:var(--ink-soft)}
.btn-ghost:hover{background:var(--ghost-hover);color:var(--ink)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{filter:brightness(.94)}
.btn-bad{background:var(--bad-bg);color:var(--bad-tx)}.btn-bad:hover{filter:brightness(.95)}
.btn-warn{background:var(--warn);color:#fff}.btn-warn:hover{filter:brightness(.95)}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

/* ---------- Cards / sections ---------- */
.section-head{display:flex;align-items:center;gap:12px;margin:2px 0 16px}
.section-head h2{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft)}
.section-head .line{flex:1;height:1px;background:var(--line)}

/* ---------- Floor / tables ---------- */
.zone{margin-bottom:26px}
.tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.table-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;transition:.16s;box-shadow:var(--shadow-sm);text-align:left}
.table-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.table-card .accent{position:absolute;left:0;top:0;bottom:0;width:5px}
.table-card.free .accent{background:var(--free)}
.table-card.busy .accent{background:var(--busy)}
.table-card.resv .accent{background:var(--resv)}
.table-card .tname{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
.table-card .seats{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.table-card .status-row{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:12px;font-weight:700}
.table-card.free .status-row{color:var(--free)}
.table-card.busy .status-row{color:var(--busy)}
.table-card.resv .status-row{color:var(--warn-tx)}
.table-card .amount{margin-top:12px;font-size:22px;font-weight:800;letter-spacing:-.5px}
.table-card .meta{margin-top:4px;font-size:12px;color:var(--muted);font-weight:600}
.table-card .flag{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;padding:4px 8px;border-radius:8px;display:inline-flex;align-items:center;gap:4px}
.flag.alert{background:var(--alert-bg);color:var(--alert-tx);animation:pulse 1.6s infinite}
.flag.soon{background:var(--soon-bg);color:var(--soon-tx)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:8px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm)}
.kpi .k{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.kpi .v{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:8px}
.kpi .d{font-size:12px;font-weight:600;margin-top:2px;color:var(--ink-soft)}
.kpi .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff}

/* ---------- Kitchen (KDS) ---------- */
.kds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.ticket{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);display:flex;flex-direction:column}
.ticket .urgency{height:6px;background:var(--ok);transition:.4s}
.ticket .thead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.ticket .thead .tt{font-weight:800;font-size:16px}
.ticket .thead .station{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:7px}
.st-cocina{background:var(--warn-bg);color:var(--warn-tx)}
.st-barra{background:var(--barra-bg);color:var(--barra-tx)}
.ticket .timer{padding:0 16px;font-size:12px;font-weight:700;color:var(--muted)}
.ticket .items{padding:12px 16px;display:flex;flex-direction:column;gap:9px;flex:1}
.kline{display:flex;gap:10px;align-items:flex-start;font-size:15px}
.kline .qty{font-weight:800;color:var(--brand);min-width:24px}
.kline .nm{font-weight:600;flex:1}
.kline .note{display:block;font-size:12px;color:var(--warn);font-weight:700;margin-top:2px}
.kline.done .nm{text-decoration:line-through;color:var(--muted)}
.kline .chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:none;display:grid;place-items:center;transition:.15s}
.kline.done .chk{background:var(--ok);border-color:var(--ok);color:#fff}
.ticket .tfoot{padding:12px 16px;border-top:1px solid var(--line)}

/* ---------- Reservations ---------- */
.resv-list{display:flex;flex-direction:column;gap:12px;max-width:820px}
.resv-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow-sm)}
.resv-card .time{text-align:center;min-width:64px}
.resv-card .time .hh{font-size:22px;font-weight:800;letter-spacing:-.5px}
.resv-card .time .cd{font-size:11px;font-weight:700;color:var(--muted)}
.resv-card .info{flex:1;min-width:0}
.resv-card .info .nm{font-weight:800;font-size:16px}
.resv-card .info .dt{font-size:13px;color:var(--ink-soft);font-weight:600;margin-top:2px}
.resv-card.imminent{border-color:var(--warn);background:linear-gradient(90deg,var(--soon-bg),var(--panel) 60%)}

/* ---------- Sales history ---------- */
.table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
table.data{width:100%;border-collapse:collapse}
table.data th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:800;padding:14px 18px;border-bottom:1px solid var(--line)}
table.data td{padding:14px 18px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600}
table.data tr:last-child td{border-bottom:none}
table.data tr:hover td{background:var(--panel-2)}
.tag{display:inline-flex;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;letter-spacing:.3px}
.tag.efectivo{background:var(--ok-bg);color:var(--ok-tx)}
.tag.tarjeta{background:var(--tarjeta-bg);color:var(--tarjeta-tx)}

/* ---------- Empty ---------- */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--muted);text-align:center}
.empty svg{width:52px;height:52px;opacity:.4}
.empty p{font-weight:600;font-size:15px}

/* ---------- Modal / drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;height:100dvh;width:min(560px,94vw);background:var(--panel-2);box-shadow:-20px 0 60px -20px rgba(0,0,0,.4);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column}
.drawer.on{transform:translateX(0)}
.drawer-head{flex:none;background:var(--panel);padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
.drawer-head .dt{font-size:19px;font-weight:800}
.drawer-head .ds{font-size:13px;color:var(--muted);font-weight:600}
.drawer-head .x{margin-left:auto;width:38px;height:38px;border-radius:11px;background:var(--panel-2);display:grid;place-items:center;color:var(--ink-soft)}
.drawer-head .x:hover{background:var(--ghost-hover)}
.drawer-body{flex:1;overflow:auto;padding:20px 22px}
.drawer-foot{flex:none;background:var(--panel);border-top:1px solid var(--line);padding:16px 22px;display:flex;flex-direction:column;gap:12px}

/* menu categories */
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px}
.cats button{padding:8px 14px;border-radius:999px;background:var(--panel);border:1px solid var(--line);font-weight:700;font-size:13px;color:var(--ink-soft);white-space:nowrap;transition:.14s}
.cats button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.menu-item{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;text-align:left;transition:.14s;position:relative}
.menu-item:hover{border-color:var(--brand);box-shadow:var(--shadow-sm)}
.menu-item .mn{font-weight:700;font-size:14px;line-height:1.25}
.menu-item .mp{font-size:13px;font-weight:800;color:var(--brand);margin-top:6px}
.menu-item .mstation{position:absolute;top:10px;right:10px;font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted)}

/* current order lines */
.order-lines{display:flex;flex-direction:column;gap:8px}
.oline{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px}
.oline .top{display:flex;align-items:center;gap:10px}
.oline .onm{font-weight:700;font-size:14px;flex:1}
.oline .op{font-weight:800;font-size:14px}
.stepper{display:inline-flex;align-items:center;background:var(--stepper-bg);border-radius:9px;overflow:hidden}
.stepper button{width:30px;height:30px;font-size:17px;font-weight:800;color:var(--ink-soft);display:grid;place-items:center}
.stepper button:hover{background:var(--stepper-hover);color:var(--ink)}
.stepper .q{min-width:30px;text-align:center;font-weight:800;font-size:14px}
.oline .noterow{margin-top:8px}
.oline .noteinput{width:100%;border:1px dashed var(--line);background:var(--panel-2);border-radius:9px;padding:7px 10px;font-size:13px;color:var(--ink-soft);font-weight:600}
.oline .noteinput:focus{outline:none;border-color:var(--brand);border-style:solid}
.oline .statebadge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.sb-nuevo{background:var(--info-bg);color:var(--info-tx)}
.sb-preparando{background:var(--warn-bg);color:var(--warn-tx)}
.sb-listo{background:var(--ok-bg);color:var(--ok-tx)}
.sb-servido{background:var(--neutral-bg);color:var(--neutral-tx)}

.total-row{display:flex;align-items:baseline;justify-content:space-between;padding:4px 2px}
.total-row .tl{font-size:13px;font-weight:700;color:var(--muted)}
.total-row .tv{font-size:15px;font-weight:700}
.total-row.grand .tl{font-size:15px;color:var(--ink);text-transform:uppercase;letter-spacing:.4px}
.total-row.grand .tv{font-size:26px;font-weight:800;color:var(--brand)}

/* split payment */
.split-diners{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.split-diners button{width:44px;height:44px;border-radius:12px;background:var(--panel);border:1px solid var(--line);font-weight:800;font-size:16px}
.split-diners button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.split-result{background:var(--brand-ink);border-radius:12px;padding:14px 16px;text-align:center;margin-top:6px}
.split-result .per{font-size:28px;font-weight:800;color:var(--brand)}
.split-result .lbl{font-size:12px;font-weight:700;color:var(--ink-soft)}

/* form */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--panel);font-weight:600}
.field input:focus,.field select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--ink);color:var(--panel);padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;box-shadow:var(--shadow);animation:rise .3s;display:flex;align-items:center;gap:9px}
.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}.toast.info{background:var(--brand)}
@keyframes rise{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ============================================================
   PANTALLA DE ACCESO (activación con ID + PIN) y selector de camarero
   ============================================================ */
.gate{position:fixed;inset:0;z-index:110;display:none;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(120% 120% at 50% 0%,#16224a,#0b1020 55%,#070b16)}
.gate.on{display:flex}
.gate-card{width:min(420px,96vw);max-height:94dvh;overflow:auto;text-align:center;color:#e8eefc}
.gate-logo{width:88px;height:88px;border-radius:26px;margin:0 auto 18px;display:grid;place-items:center;
  background:linear-gradient(135deg,#2563eb,#06b6d4);box-shadow:0 22px 50px -18px rgba(37,99,235,.9)}
.gate-logo svg{width:50px;height:50px}
.gate h1{font-size:27px;font-weight:800;letter-spacing:-.6px;margin-bottom:6px}
.gate .sub{font-size:14px;color:#8fa3c8;font-weight:600;margin-bottom:26px;line-height:1.5}
.gate-field{text-align:left;margin-bottom:14px}
.gate-field label{display:block;font-size:11px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;
  color:#7f93b8;margin-bottom:7px}
.gate-field input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid #263559;color:#fff;
  border-radius:14px;padding:16px;font-size:20px;font-weight:800;text-align:center;letter-spacing:3px}
.gate-field input::placeholder{color:#41537a;letter-spacing:1px;font-weight:600}

.gate-btn{width:100%;padding:17px;border-radius:14px;font-size:16px;font-weight:800;margin-top:6px;
  background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;transition:.15s}

/* selector de camarero */

  color:#e8eefc;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:9px}

/* ---------- Panel técnico (oculto — solo proveedor) ---------- */
.admin-scrim{position:fixed;inset:0;background:rgba(2,6,23,.78);backdrop-filter:blur(3px);z-index:90;display:none;align-items:center;justify-content:center;padding:22px}
.admin-scrim.on{display:flex}
.admin-panel{width:min(920px,96vw);max-height:92vh;max-height:92dvh;overflow:auto;background:linear-gradient(180deg,#0f172a,#0b1226);color:#e2e8f0;border:1px solid #1e293b;border-radius:22px;box-shadow:0 40px 90px -30px rgba(0,0,0,.8)}

.adm-head .adm-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#fff;flex:none}
.adm-head h2{font-size:17px;font-weight:800;letter-spacing:-.2px;color:#f1f5f9}
.adm-head .tagline{font-size:12px;color:#64748b;font-weight:600;margin-top:2px}
.adm-close{margin-left:auto;width:38px;height:38px;border-radius:11px;background:#1e293b;color:#94a3b8;display:grid;place-items:center;flex:none}

.adm-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.adm-sec{background:rgba(255,255,255,.03);border:1px solid #1e293b;border-radius:16px;padding:16px 18px}
.adm-sec h3{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#7dd3fc;margin-bottom:13px;display:flex;align-items:center;gap:8px}

.adm-field input,.adm-field select{width:100%;background:#0b1226;border:1px solid #263349;color:#e2e8f0;border-radius:10px;padding:9px 11px;font-weight:600;font-size:14px}

.btn-dark:hover{background:#28374f;color:#f1f5f9}

.adm-cat-head .nm{font-weight:800;font-size:14px;color:#f1f5f9}

/* ---------- Tablets en vertical y pantallas medianas ---------- */
@media(max-width:820px){
  /* la barra superior no debe desbordarse: se oculta el subtítulo y los contadores
     redundantes (ya se ven en cada mesa); se mantiene el título y el estado de nube */

<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand" id="brand" title="vortexPOS">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 4l6 16 2-6 2 6 4-16" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="clock" id="clock"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="viewTitle">Sala</h1>
        <div class="sub" id="viewSub">Plano de mesas en tiempo real</div>
      </div>
      <div class="spacer"></div>
      <button class="pill" id="staffPill" style="display:none" title="Cambiar de camarero"><span class="staff-ava" id="staffPillAva" style="width:22px;height:22px;font-size:10px"></span> <b id="staffPillName"></b></button>
      <div class="pill" id="cloudPill" style="display:none" title="Estado de sincronización con vortexPOS Cloud"><span class="dot" style="background:var(--muted)"></span> <b>Nube</b></div>
      <div class="pill"><span class="dot" style="background:var(--free)"></span> <b id="pFree">0</b> libres</div>
      <div class="pill"><span class="dot" style="background:var(--busy)"></span> <b id="pBusy">0</b> ocupadas</div>
      <div class="pill"><span class="dot" style="background:var(--resv)"></span> <b id="pResv">0</b> reservas</div>
    </header>
    <section class="view" id="view"></section>
  </main>
</div>

<!-- Drawer -->
<div class="scrim" id="scrim"></div>

  <div class="drawer-head" id="drawerHead"></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</aside>

<!-- Pantalla de acceso: activación del dispositivo (ID + PIN) y selector de camarero -->
<div class="gate" id="gate"><div class="gate-card" id="gateCard"></div></div>

<div class="toast-wrap" id="toasts"></div>

<!-- Panel técnico (oculto): mantener pulsado el logo ~2 s o Ctrl+Alt+A -->
<div class="admin-scrim" id="adminScrim"><div class="admin-panel" id="adminPanel"></div></div>
<div class="admin-scrim" id="pinScrim"><div class="pin-pad" id="pinPad"></div></div>

<script>
"use strict";

/* ============================================================
   vortexPOS — sistema de sala / comandas / cocina / caja
   Single-file, persistencia en localStorage.
   ============================================================ */

const STORE_KEY = "vortexpos.v1";
const BAK_KEY = "vortexpos.v1.bak";
const ERRLOG = []; // últimos errores en tiempo de ejecución — visibles en el diagnóstico del panel técnico
function logErr(msg){
  ERRLOG.push(new Date().toLocaleTimeString("es-ES")+" · "+msg);
  if(ERRLOG.length>10)ERRLOG.shift();
  console.error("[vortexPOS]",msg);
}
let persistFailWarned=false; // declarado antes de load(): persist() puede ejecutarse en el primer arranque
const money = n => { if(!isFinite(n)) n=0; return (n<-0.004?"−":"") + "€" + (Math.round(Math.abs(n)*100)/100).toFixed(2).replace(".",","); };
const now = () => Date.now();
const uid = () => Math.random().toString(36).slice(2,9);
const minsSince = ts => Math.floor((now()-ts)/60000);
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------------- Menú por defecto (la carta editable vive en S.menu) ---------------- */
const DEFAULT_MENU = [
  {cat:"Entrantes", station:"cocina", items:[
    {id:"e1",name:"Croquetas de jamón (6u)",price:8.5},
    {id:"e2",name:"Ensaladilla rusa",price:6.9},
    {id:"e3",name:"Pan con tomate",price:3.2},
    {id:"e4",name:"Tabla de ibéricos",price:14.0},
  ]},
  {cat:"Principales", station:"cocina", items:[
    {id:"p1",name:"Entrecot a la brasa",price:19.5},
    {id:"p2",name:"Risotto de setas",price:13.0},
    {id:"p3",name:"Lubina al horno",price:17.8},
    {id:"p4",name:"Hamburguesa vortex",price:12.5},
    {id:"p5",name:"Paella marinera (min. 2)",price:16.0},
  ]},
  {cat:"Postres", station:"cocina", items:[
    {id:"d1",name:"Coulant de chocolate",price:6.5},
    {id:"d2",name:"Tarta de queso",price:5.9},
    {id:"d3",name:"Fruta de temporada",price:4.5},
  ]},
  {cat:"Bebidas", station:"barra", items:[
    {id:"b1",name:"Caña",price:2.5},
    {id:"b2",name:"Copa de vino",price:3.8},
    {id:"b3",name:"Refresco",price:2.8},
    {id:"b4",name:"Agua 50cl",price:2.0},
    {id:"b5",name:"Café solo",price:1.6},
    {id:"b6",name:"Gin tonic",price:8.5},
  ]},
];
function findProd(pid,menu){for(const c of menu){const it=c.items.find(x=>x.id===pid);if(it)return{...it,cat:c.cat,station:c.station};}return null;}
function prodById(pid){return findProd(pid,(S&&S.menu)?S.menu:DEFAULT_MENU);}
const pad4=n=>String(n).padStart(4,"0");

/* ---------------- Estado ---------------- */
let S=null; // se asigna tras declarar para que seed() pueda usar prodById sin TDZ
S=load();

function seed(){
  const t = (id,name,zone,seats,status="free")=>({id,name,zone,seats,status,orderId:null});
  const tables = [
    t("M1","Mesa 1","Salón",2), t("M2","Mesa 2","Salón",4),
    t("M3","Mesa 3","Salón",4), t("M4","Mesa 4","Salón",6),
    t("M5","Mesa 5","Salón",2), t("M6","Mesa 6","Salón",4),
    t("T1","Terraza 1","Terraza",2), t("T2","Terraza 2","Terraza",4),
    t("T3","Terraza 3","Terraza",4), t("T4","Terraza 4","Terraza",8),
    t("B1","Barra 1","Barra",1), t("B2","Barra 2","Barra",1),
  ];
  const orders = {};
  const st = now();
  // Mesa 2 ocupada, comanda con retraso
  const o1 = mkOrder("M2");
  o1.openedAt = st - 34*60000;
  o1.items = [
    line("p1",1,"al punto", st-30*60000,"preparando"),
    line("e1",2,"", st-30*60000,"listo"),
    line("b1",3,"", st-30*60000,"servido"),
  ];
  orders[o1.id]=o1; tables.find(x=>x.id==="M2").status="busy"; tables.find(x=>x.id==="M2").orderId=o1.id;
  // Mesa 4 recién abierta
  const o2 = mkOrder("M4");
  o2.openedAt = st - 6*60000;
  o2.items = [
    line("p5",1,"", st-4*60000,"preparando"),
    line("b2",2,"", st-4*60000,"nuevo"),
    line("b4",1,"", st-4*60000,"nuevo"),
  ];
  orders[o2.id]=o2; tables.find(x=>x.id==="M4").status="busy"; tables.find(x=>x.id==="M4").orderId=o2.id;
  // Terraza 2 con reserva
  tables.find(x=>x.id==="T2").status="resv";

  const reservations = [
    {id:uid(),name:"Familia Soler",people:4,phone:"600 12 34 56",time:mkTime(0,25),tableId:"T2",status:"pending"},
    {id:uid(),name:"Marc & Júlia",people:2,phone:"611 98 76 54",time:mkTime(1,10),tableId:null,status:"pending"},
    {id:uid(),name:"Empresa NexT",people:8,phone:"622 44 55 66",time:mkTime(2,30),tableId:null,status:"pending"},
  ];

  const sales = [
    sale("M5","tarjeta", st-52*60000, [line("p4",1),line("p2",1),line("b1",2),line("d2",1)]),
    sale("B1","efectivo", st-70*60000, [line("b1",2),line("b5",1)]),
    sale("M1","tarjeta", st-95*60000, [line("e2",1),line("p3",1),line("b2",2),line("d1",2)]),
  ];

  const s={tables, orders, reservations, sales, closures:[], zCounter:0, sessionStart:st, seededAt:st, cashFloat:100, cashMoves:[]};
  migrate(s);
  return s;
}

function mkTime(hAdd,mAdd){ const d=new Date(now()+hAdd*3600000+mAdd*60000); return d.getTime(); }
function mkOrder(tableId){ return {id:uid(),tableId,openedAt:now(),items:[]}; }
function line(pid,qty,notes="",ts=now(),status="nuevo"){
  const p=prodById(pid);
  return {lid:uid(),pid,name:p.name,price:p.price,station:p.station,qty,notes,createdAt:ts,status};
}
function sale(tableId,method,ts,items){
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  const w=(typeof currentStaff==="function")?currentStaff():null;   // quién cobró
  return {id:uid(),tableId,method,paidAt:ts,items,total,
          staffId:w?w.id:"", staffName:w?w.name:""};
}

function load(){
  // intenta datos principales; si están corruptos, recurre a la copia interna antes de re-sembrar
  for(const key of [STORE_KEY,BAK_KEY]){
    try{
      const raw=localStorage.getItem(key);
      if(raw){
        const s=JSON.parse(raw);
        if(!Array.isArray(s.tables))throw new Error("estructura inválida");
        migrate(s);
        if(key===BAK_KEY)logErr("Datos principales dañados — restaurada la copia interna de seguridad");
        return s;
      }
    }catch(e){logErr("No se pudo leer "+key+": "+e.message);}
  }
  const s=seed(); persist(s); return s;
}
function migrate(s){ // compatibilidad con datos guardados por versiones anteriores
  s.orders=s.orders||{}; s.sales=s.sales||[]; s.reservations=s.reservations||[];
  s.closures=s.closures||[];
  s.zCounter=s.zCounter||0;
  s.sessionStart=s.sessionStart||s.seededAt||now();
  if(typeof s.cashFloat!=="number")s.cashFloat=0;
  s.cashMoves=s.cashMoves||[];
  if(!s.menu||!s.menu.length)s.menu=JSON.parse(JSON.stringify(DEFAULT_MENU));
  if(typeof s.menuUpdatedAt!=="number")s.menuUpdatedAt=s.seededAt||now();
  if(!s.cloudAcked||typeof s.cloudAcked!=="object")s.cloudAcked={};
  if(!Array.isArray(s.staff))s.staff=[];
  if(typeof s.currentStaffId!=="string")s.currentStaffId="";
  if(!s.tables.some(t=>t.zone==="Para llevar")){ // venta rápida de mostrador (chiringuito)
    s.tables.push(
      {id:"L1",name:"Llevar 1",zone:"Para llevar",seats:1,status:"free",orderId:null},
      {id:"L2",name:"Llevar 2",zone:"Para llevar",seats:1,status:"free",orderId:null}
    );
  }
  s.reservations.forEach(r=>{ // caduca reservas olvidadas (más de 12 h de retraso)
    if(r.status==="pending"&&r.time<now()-12*3600000){
      r.status="expired";
      const t=s.tables.find(x=>x.id===r.tableId);
      if(t&&t.status==="resv")t.status="free";
    }
  });
}
function persist(s=S){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify(s));
    persistFailWarned=false;
  }catch(e){
    logErr("Fallo al guardar datos: "+e.message);
    if(!persistFailWarned){persistFailWarned=true;toast("⚠ No se pudo guardar — almacenamiento lleno o bloqueado","bad");}
  }
}
function backupSnapshot(){ // copia interna: se restaura sola si los datos principales se corrompen
  try{const raw=localStorage.getItem(STORE_KEY); if(raw)localStorage.setItem(BAK_KEY,raw);}catch(e){}
}
function save(){ persist(); render(); }

/* ---------------- Helpers de dominio ---------------- */
function orderTotal(o){ return o.items.reduce((s,i)=>s+i.price*i.qty,0); }
function tableOrder(t){ return t.orderId ? S.orders[t.orderId] : null; }
function pendingKitchen(){
  // tickets: por comanda, líneas ENVIADAS (preparando/listo) agrupadas por estación
  // las líneas "nuevo" aún no se han mandado — no deben aparecer en cocina
  const tickets=[];
  Object.values(S.orders).forEach(o=>{
    const t=S.tables.find(x=>x.id===o.tableId);
    ["cocina","barra"].forEach(st=>{
      const items=o.items.filter(i=>i.station===st && (i.status==="preparando"||i.status==="listo"));
      if(items.length){
        const oldest=Math.min(...items.map(i=>i.createdAt));
        tickets.push({orderId:o.id,table:t,station:st,items,oldest});
      }
    });
  });
  return tickets.sort((a,b)=>a.oldest-b.oldest);
}
function kitchenAlerts(){ return pendingKitchen().filter(t=>minsSince(t.oldest)>=15).length; }

/* ---------------- Router ---------------- */
const VIEWS=[
  {id:"sala",label:"Sala",title:"Sala",sub:"Plano de mesas en tiempo real",icon:iconGrid},
  {id:"cocina",label:"Cocina",title:"Cocina · KDS",sub:"Tickets por orden de llegada",icon:iconFlame},
  {id:"reservas",label:"Reservas",title:"Reservas",sub:"Próximas entradas y asignación de mesa",icon:iconCal},
  {id:"personal",label:"Personal",title:"Camareros",sub:"Equipo del local y cambio de turno",icon:iconStaff},
  {id:"caja",label:"Caja",title:"Caja",sub:"Cuentas abiertas, arqueo y cierre de caja",icon:iconCard},
];
let current="sala";

function buildNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML=VIEWS.filter(v=>moduleOn(v.id)).map(v=>{
    let badge="";
    if(v.id==="cocina"){const n=pendingKitchen().length; if(n)badge=`<span class="badge">${n}</span>`;}
    if(v.id==="reservas"){const n=S.reservations.filter(r=>r.status==="pending").length; if(n)badge=`<span class="badge" style="background:var(--warn)">${n}</span>`;}
    return `<button class="${v.id===current?'active':''}" data-view="${v.id}">${v.icon()}<span>${v.label}</span>${badge}</button>`;
  }).join("");
  nav.querySelectorAll("button").forEach(b=>b.onclick=()=>{current=b.dataset.view;render();});
}

/* ---------------- Render ---------------- */
function render(){
  if(!moduleOn(current))current="sala";
  const v=VIEWS.find(x=>x.id===current);
  document.getElementById("viewTitle").textContent=v.title;
  document.getElementById("viewSub").textContent=v.sub;
  // topbar counts
  const free=S.tables.filter(t=>t.status==="free").length;
  const busy=S.tables.filter(t=>t.status==="busy").length;
  const resv=S.tables.filter(t=>t.status==="resv").length;
  document.getElementById("pFree").textContent=free;
  document.getElementById("pBusy").textContent=busy;
  document.getElementById("pResv").textContent=resv;
  // camarero en turno (visible y pulsable para cambiar)
  const sp=document.getElementById("staffPill"), w=currentStaff();
  if(sp){
    if(w){
      sp.style.display="inline-flex";
      const ava=document.getElementById("staffPillAva");
      ava.textContent=staffInitials(w.name); ava.style.background=staffColor(w);
      document.getElementById("staffPillName").textContent=w.name;
      sp.onclick=switchStaff;
    } else sp.style.display="none";
  }
  buildNav();
  const view=document.getElementById("view");
  if(current==="sala")view.innerHTML=renderSala();
  else if(current==="cocina")view.innerHTML=renderCocina();
  else if(current==="reservas")view.innerHTML=renderReservas();
  else if(current==="personal")view.innerHTML=renderPersonal();
  else if(current==="caja")view.innerHTML=renderCaja();
  wireView();
}

/* ----- SALA ----- */
function renderSala(){
  const zones=[...new Set(S.tables.map(t=>t.zone))];
  return zones.map(z=>{
    const cards=S.tables.filter(t=>t.zone===z).map(t=>{
      const o=tableOrder(t);
      const total=o?orderTotal(o):0;
      let flag="";
      if(o){
        const pk=o.items.filter(i=>i.status==="preparando"||i.status==="listo");
        const oldest=pk.length?Math.min(...pk.map(i=>i.createdAt)):null;
        if(oldest!==null&&minsSince(oldest)>=15) flag=`<span class="flag alert">${iconClock()} ${minsSince(oldest)}m</span>`;
      }
      if(t.status==="resv"){
        const r=S.reservations.find(r=>r.tableId===t.id&&r.status==="pending");
        if(r){const m=Math.round((r.time-now())/60000); if(m>0&&m<=45) flag=`<span class="flag soon">en ${m}m</span>`;}
      }
      const statusTxt=t.status==="free"?"Libre":t.status==="busy"?"Ocupada":"Reservada";
      const meta = t.status==="busy"&&o?`<div class="meta">Abierta hace ${minsSince(o.openedAt)} min · ${o.items.length} líneas</div>`
        : t.status==="resv"?(()=>{const r=S.reservations.find(r=>r.tableId===t.id&&r.status==="pending");return r?`<div class="meta">${esc(r.name)} · ${fmtTime(r.time)}</div>`:"";})()
        : `<div class="meta">Toca para abrir</div>`;
      return `<button class="table-card ${t.status}" data-table="${t.id}">
        <div class="accent"></div>${flag}
        <div class="tname">${t.name}</div>
        <div class="seats">${iconUsers()} ${t.seats} pax</div>
        <div class="status-row"><span class="dot" style="background:currentColor"></span>${statusTxt}</div>
        ${t.status==="busy"?`<div class="amount">${money(total)}</div>`:``}
        ${meta}
      </button>`;
    }).join("");
    return `<div class="zone"><div class="section-head"><h2>${z}</h2><div class="line"></div></div><div class="tables-grid">${cards}</div></div>`;
  }).join("");
}

/* ----- COCINA (KDS) ----- */
function renderCocina(){
  const tickets=pendingKitchen();
  if(!tickets.length) return emptyState(iconFlame(),"Sin tickets pendientes. Cocina y barra al día. ✨");
  return `<div class="kds-grid">`+tickets.map(tk=>{
    const mins=minsSince(tk.oldest);
    const pct=clamp(mins/20*100,4,100);
    const col = mins>=15?"var(--bad)":mins>=8?"var(--warn)":"var(--ok)";
    const lines=tk.items.map(i=>`
      <div class="kline ${i.status==='listo'||i.status==='servido'?'done':''}" data-order="${tk.orderId}" data-line="${i.lid}">
        <div class="chk">${(i.status==='listo'||i.status==='servido')?iconCheck():''}</div>
        <div class="nm"><span class="qty">${i.qty}×</span> ${esc(i.name)}${i.notes?`<span class="note">⚠ ${esc(i.notes)}</span>`:''}</div>
      </div>`).join("");
    const allReady=tk.items.every(i=>i.status==='listo'||i.status==='servido');
    return `<div class="ticket">
      <div class="urgency" style="width:${pct}%;background:${col}"></div>
      <div class="thead"><div class="tt">${tk.table?tk.table.name:'—'}</div>
        <div class="station st-${tk.station}">${tk.station==='cocina'?'🍳 Cocina':'🍹 Barra'}</div></div>
      <div class="timer" style="color:${col}">${iconClock()} ${mins} min en cola</div>
      <div class="items">${lines}</div>
      <div class="tfoot"><button class="btn ${allReady?'btn-ok':'btn-ghost'}" style="width:100%" data-serve="${tk.orderId}" data-station="${tk.station}" ${allReady?'':'disabled'}>${allReady?'Marcar servido':'Marca cada plato al terminar'}</button></div>
    </div>`;
  }).join("")+`</div>`;
}

/* ----- RESERVAS ----- */
function renderReservas(){
  const pend=S.reservations.filter(r=>r.status==="pending").sort((a,b)=>a.time-b.time);
  const header=`<div class="section-head"><h2>Próximas reservas</h2><div class="line"></div>
     <button class="btn btn-primary btn-sm" id="newResv">${iconPlus()} Nueva reserva</button></div>`;
  if(!pend.length) return header+emptyState(iconCal(),"No hay reservas pendientes.");
  const list=pend.map(r=>{
    const m=Math.round((r.time-now())/60000);
    const cd = m<0?`hace ${-m}m`:m<60?`en ${m}m`:`en ${Math.floor(m/60)}h ${m%60}m`;
    const imminent=m>=0&&m<=30;
    const tbl=r.tableId?S.tables.find(t=>t.id===r.tableId):null;
    return `<div class="resv-card ${imminent?'imminent':''}">
      <div class="time"><div class="hh">${fmtTime(r.time)}</div><div class="cd">${cd}</div></div>
      <div class="info">
        <div class="nm">${esc(r.name)}</div>
        <div class="dt">${iconUsers()} ${r.people} pax · ${esc(r.phone)}${tbl?` · <b>${tbl.name}</b>`:` · <span style="color:var(--warn)">sin mesa</span>`}</div>
      </div>
      ${tbl?`<button class="btn btn-ok btn-sm" data-seat="${r.id}">${iconCheck()} Sentar</button>`
           :`<button class="btn btn-primary btn-sm" data-assign="${r.id}">Asignar mesa</button>`}
      <button class="btn btn-bad btn-sm" data-cancelresv="${r.id}">Cancelar</button>
    </div>`;
  }).join("");
  return header+`<div class="resv-list">${list}</div>`;
}

/* ----- CAJA ----- */
function salesSummary(sales){
  const byMethod={}, byProduct={};
  let total=0, items=0;
  sales.forEach(s=>{
    total+=s.total;
    byMethod[s.method]=(byMethod[s.method]||0)+s.total;
    s.items.forEach(i=>{
      const p=byProduct[i.name]=byProduct[i.name]||{qty:0,amount:0};
      p.qty+=i.qty; p.amount+=i.price*i.qty; items+=i.qty;
    });
  });
  return {total,tickets:sales.length,items,byMethod,byProduct,avg:sales.length?total/sales.length:0};
}
function renderCaja(){
  const sess=S.sales; // ventas desde el último cierre Z
  const sum=salesSummary(sess);
  const top=Object.entries(sum.byProduct).sort((a,b)=>b[1].qty-a[1].qty)[0];
  const openBills=S.tables.filter(t=>t.status==="busy").map(t=>tableOrder(t)).filter(Boolean);

  const kpis=`<div class="kpis">
    <div class="kpi"><div class="k">${kpiIc('var(--brand)',iconCard())} Facturación sesión</div><div class="v">${money(sum.total)}</div><div class="d">${sum.tickets} tickets desde el último cierre</div></div>
    <div class="kpi"><div class="k">${kpiIc('var(--info)',iconChart())} Ticket medio</div><div class="v">${money(sum.avg)}</div><div class="d">${sum.items} artículos vendidos</div></div>
    <div class="kpi"><div class="k">${kpiIc('var(--ok)',iconStar())} Más vendido</div><div class="v" style="font-size:22px">${top?esc(top[0]):'—'}</div><div class="d">${top?top[1].qty+' unidades':'sin datos'}</div></div>
    <div class="kpi"><div class="k">${kpiIc('var(--warn)',iconTable())} Cuentas abiertas</div><div class="v">${openBills.length}</div><div class="d">${money(openBills.reduce((s,o)=>s+orderTotal(o),0))} en sala</div></div>
  </div>`;

  const cashHead=`<div class="section-head" style="margin-top:22px"><h2>Caja y efectivo</h2><div class="line"></div></div>`;
  const moves=S.cashMoves||[];
  const movRows=moves.slice().reverse().map(m=>`<tr>
    <td>${fmtTime(m.at)}</td>
    <td><span class="tag" style="${m.type==='in'?'background:var(--ok-bg);color:var(--ok-tx)':'background:var(--bad-bg);color:var(--bad-tx)'}">${m.type==='in'?'entrada':'salida'}</span></td>

  const cash=`
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
    <div class="pill">Fondo de caja: <b>${money(S.cashFloat||0)}</b></div>
    <div class="pill">Efectivo esperado en cajón: <b>${money(cashExpected())}</b></div>
    <button class="btn btn-ghost btn-sm" id="btnCashIn">${iconPlus()} Entrada efectivo</button>
    <button class="btn btn-ghost btn-sm" id="btnCashOut">− Salida efectivo</button>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-ghost" id="btnX">${iconChart()} Informe X (arqueo)</button>
    <button class="btn btn-primary" id="btnZ">${iconCheck()} Cierre Z</button>
    <span style="font-size:13px;color:var(--muted);font-weight:600">El informe X consulta sin cerrar · el cierre Z cuenta el efectivo, archiva la sesión y deja el fondo para la siguiente.</span>
  </div>
  ${moves.length?`<div class="table-wrap" style="margin-top:14px"><table class="data">
    <thead><tr><th>Hora</th><th>Tipo</th><th>Concepto</th><th style="text-align:right">Importe</th></tr></thead>
    <tbody>${movRows}</tbody></table></div>`:""}`;

  const openHead=`<div class="section-head" style="margin-top:22px"><h2>Cuentas abiertas</h2><div class="line"></div></div>`;
  const openList = openBills.length? `<div class="tables-grid">`+openBills.map(o=>{
    const t=S.tables.find(x=>x.id===o.tableId);
    return `<button class="table-card busy" data-bill="${t.id}">
      <div class="accent"></div>
      <div class="tname">${t.name}</div>
      <div class="seats">${o.items.length} líneas · ${minsSince(o.openedAt)}m</div>
      <div class="amount">${money(orderTotal(o))}</div>
      <div class="meta">Toca para cobrar</div>
    </button>`;

  const histHead=`<div class="section-head" style="margin-top:22px"><h2>Ventas de la sesión</h2><div class="line"></div></div>`;
  const rows=sess.slice().sort((a,b)=>b.paidAt-a.paidAt).map(s=>{

    <thead><tr><th>Hora</th><th>Mesa</th><th>Artículos</th><th>Pago</th><th style="text-align:right">Total</th></tr></thead>
    <tbody>${rows}</tbody></table></div>` : emptyState(iconChart(),"Aún no hay ventas en esta sesión.");

  const zHead=`<div class="section-head" style="margin-top:22px"><h2>Historial de cierres</h2><div class="line"></div>
    <button class="btn btn-ghost btn-sm" id="btnCsv">Exportar CSV</button></div>`;
  const closures=(S.closures||[]).slice().reverse().slice(0,15);
  const zRows=closures.map(c=>`<tr data-closure="${c.id}" style="cursor:pointer">
      <td><b>Z-${String(c.z).padStart(4,"0")}</b></td><td>${fmtDate(c.to)}</td>
      <td>${c.summary.tickets} tickets</td><td>${c.summary.items} art.</td>
      <td style="text-align:right;font-weight:800">${money(c.summary.total)}</td></tr>`).join("");
  const zList=closures.length?`<div class="table-wrap"><table class="data">
    <thead><tr><th>Cierre</th><th>Fecha</th><th>Tickets</th><th>Artículos</th><th style="text-align:right">Total</th></tr></thead>
    <tbody>${zRows}</tbody></table></div>`:emptyState(iconCal(),"Todavía no hay cierres Z registrados.");

  return kpis+cashHead+cash+openHead+openList+histHead+hist+zHead+zList;
}

/* ----- Efectivo: fondo, movimientos y esperado ----- */
function cashSalesEfectivo(){return S.sales.filter(s=>s.method==="efectivo").reduce((a,s)=>a+s.total,0);}
function cashIn(){return (S.cashMoves||[]).filter(m=>m.type==="in").reduce((a,m)=>a+m.amount,0);}
function cashOut(){return (S.cashMoves||[]).filter(m=>m.type==="out").reduce((a,m)=>a+m.amount,0);}
function cashExpected(){return (S.cashFloat||0)+cashSalesEfectivo()+cashIn()-cashOut();}
function openCashMove(type){
  document.getElementById("drawerHead").innerHTML=`
    <div><div class="dt">${type==="in"?"Entrada":"Salida"} de efectivo</div>
    <div class="ds">${type==="in"?"Añadir dinero al cajón (cambio, fondo extra…)":"Retirar dinero del cajón (proveedor, gasto…)"}</div></div>
    <button class="x" id="closeDrawer">${iconX()}</button>`;
  document.getElementById("drawerBody").innerHTML=`
    <div class="field"><label>Concepto</label><input id="cmConcept" placeholder="${type==="in"?"Ej: cambio del banco":"Ej: pago proveedor hielo"}"></div>
    <div class="field"><label>Importe (€)</label><input id="cmAmount" type="number" min="0" step="0.01" inputmode="decimal" style="font-size:20px;font-weight:800"></div>`;
  document.getElementById("drawerFoot").innerHTML=`
    <button class="btn btn-primary" id="cmSave" style="width:100%">${iconCheck()} Registrar ${type==="in"?"entrada":"salida"}</button>`;
  document.getElementById("closeDrawer").onclick=closeDrawer;
  document.getElementById("cmSave").onclick=()=>{
    const concept=val("cmConcept")||(type==="in"?"Entrada de efectivo":"Salida de efectivo");
    const amount=parseFloat(document.getElementById("cmAmount").value);
    if(!(amount>0)){toast("Introduce un importe válido","bad");return;}
    S.cashMoves.push({id:uid(),type,concept,amount,at:now()});
    persist();closeDrawer();render();
    toast(`${type==="in"?"Entrada":"Salida"} de ${money(amount)} registrada`,"ok");
  };
  openDrawer();
}

function commitZ(counted,next){
  const sum=salesSummary(S.sales);
  S.zCounter=(S.zCounter||0)+1;
  const cash={fondoInicial:S.cashFloat||0,ventasEfectivo:cashSalesEfectivo(),entradas:cashIn(),salidas:cashOut(),
    esperado:cashExpected(),contado:counted,descuadre:counted-cashExpected(),fondoSiguiente:next};
  const c={id:uid(),z:S.zCounter,from:S.sessionStart||now(),to:now(),summary:sum,cash,sales:S.sales.slice(),moves:S.cashMoves.slice()};
  (S.closures=S.closures||[]).push(c);
  S.sales=[]; S.cashMoves=[]; S.cashFloat=next; S.sessionStart=now();
  persist(); backupSnapshot(); render();
  if(typeof CLOUD!=="undefined")CLOUD.sync(); // archiva el cierre Z en la nube
  if(ADMIN.printer.enabled)printHTML(reportTicketHTML(`CIERRE Z-${pad4(c.z)}`,sum,c.from,c.to,cash));
  showClosureReport(c);
  toast(`Cierre Z-${pad4(c.z)} realizado`,"ok");
}

/* ----- Exportación CSV de cierres (para la gestoría) ----- */
function exportClosuresCSV(){
  const cls=S.closures||[];
  if(!cls.length){toast("No hay cierres para exportar","info");return;}
  const num=n=>(Math.round((n||0)*100)/100).toFixed(2).replace(".",",");
  const vr=(parseFloat(ADMIN.business.vat)||0)/100;
  const lines=["Cierre;Desde;Hasta;Tickets;Articulos;Total;Efectivo;Tarjeta;Base imponible;Cuota IVA;Fondo inicial;Esperado;Contado;Descuadre"];
  cls.forEach(c=>{
    const s=c.summary, base=s.total/(1+vr), k=c.cash||{};
    lines.push([`Z-${pad4(c.z)}`,new Date(c.from).toLocaleString("es-ES"),new Date(c.to).toLocaleString("es-ES"),
      s.tickets,s.items,num(s.total),num(s.byMethod.efectivo||0),num(s.byMethod.tarjeta||0),num(base),num(s.total-base),
      k.fondoInicial!=null?num(k.fondoInicial):"",k.esperado!=null?num(k.esperado):"",
      k.contado!=null?num(k.contado):"",k.descuadre!=null?num(k.descuadre):""].join(";"));
  });
  const blob=new Blob(["﻿"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"}); // BOM para Excel
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="vortexpos-cierres-"+new Date().toISOString().slice(0,10)+".csv";
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  toast("CSV de cierres exportado","ok");
}

function refreshAdmCarta(){
  const box=document.getElementById("admCartaBox");

}
function wireAdmCarta(){
  const box=document.getElementById("admCartaBox"); if(!box)return;
  box.querySelectorAll("[data-admpname]").forEach(inp=>inp.onchange=()=>{
    const l=findItemLoc(inp.dataset.admpname);
    if(l&&inp.value.trim()){l.it.name=inp.value.trim();touchMenu();toast("Producto actualizado","ok");}
  });
  box.querySelectorAll("[data-admpprice]").forEach(inp=>inp.onchange=()=>{
    const l=findItemLoc(inp.dataset.admpprice);
    const p=parseFloat(inp.value);
    if(l&&p>=0){l.it.price=p;touchMenu();toast("Precio actualizado","ok");}
  });
  box.querySelectorAll("[data-admoff]").forEach(b=>b.onclick=()=>{
    const l=findItemLoc(b.dataset.admoff); if(!l)return;
    l.it.off=!l.it.off;touchMenu();refreshAdmCarta();
    toast(l.it.off?`"${l.it.name}" agotado`:`"${l.it.name}" disponible`,"info");
  });
  box.querySelectorAll("[data-admdelprod]").forEach(b=>b.onclick=()=>{
    const l=findItemLoc(b.dataset.admdelprod); if(!l)return;
    if(!confirm(`¿Eliminar "${l.it.name}" de la carta?`))return;
    S.menu[l.ci].items=S.menu[l.ci].items.filter(x=>x.id!==b.dataset.admdelprod);
    touchMenu();refreshAdmCarta();
  });
  box.querySelectorAll("[data-admaddprod]").forEach(b=>b.onclick=()=>{
    const ci=parseInt(b.dataset.admaddprod);
    const name=(box.querySelector(`[data-admnewname="${ci}"]`).value||"").trim();
    const price=parseFloat(box.querySelector(`[data-admnewprice="${ci}"]`).value);
    if(!name){toast("Escribe el nombre del producto","bad");return;}
    if(!(price>=0)){toast("Introduce un precio válido","bad");return;}
    S.menu[ci].items.push({id:uid(),name,price});
    touchMenu();refreshAdmCarta();
    toast("Producto añadido","ok");
  });
  box.querySelectorAll("[data-admdelcat]").forEach(b=>b.onclick=()=>{
    const ci=parseInt(b.dataset.admdelcat); const c=S.menu[ci]; if(!c)return;
    if(!confirm(`¿Eliminar la categoría "${c.cat}"${c.items.length?` y sus ${c.items.length} producto(s)`:""}?`))return;
    S.menu.splice(ci,1);touchMenu();refreshAdmCarta();

    const name=document.getElementById("admNewCatName").value.trim();
    if(!name){toast("Escribe el nombre de la categoría","bad");return;}
    if(S.menu.some(c=>c.cat.toLowerCase()===name.toLowerCase())){toast("Ya existe esa categoría","bad");return;}
    S.menu.push({cat:name,station:document.getElementById("admNewCatStation").value,items:[]});

    toast(`Categoría "${name}" creada`,"ok");
  };
}
function touchMenu(){ // marca la carta como modificada localmente (para Last-Write-Wins con la nube)

function findItemLoc(itemId){
  for(let ci=0;ci<S.menu.length;ci++){
    const it=S.menu[ci].items.find(x=>x.id===itemId);

  const t=S.tables.find(x=>x.id===activeTableId);

  const free=S.tables.filter(x=>x.status==="free");

    <div><div class="dt">Cambiar de mesa</div><div class="ds">${t.name} → elige el destino</div></div>
    <button class="x" id="closeDrawer">${iconX()}</button>`;

      <div class="mn">${x.name}</div><div class="mp">${x.zone} · ${x.seats} pax</div></button>`).join("")}</div>`
    :`<div class="empty">${iconTable()}<p>No hay mesas libres a las que mover la cuenta.</p></div>`;
  document.getElementById("drawerFoot").innerHTML=`<button class="btn btn-ghost" id="moveBack" style="width:100%">Volver a la comanda</button>`;

  document.getElementById("moveBack").onclick=renderComanda;
  document.getElementById("drawerBody").querySelectorAll("[data-move]").forEach(b=>b.onclick=()=>{

    activeTableId=dest.id;

    toast(`Cuenta movida a ${dest.name}`,"ok");
  });
}

  const t=S.tables.find(x=>x.id===tid);
  if(!t)return;
  if(t.status==="free"){ // abrir mesa
    const o=mkOrder(t.id); S.orders[o.id]=o; t.orderId=o.id; t.status="busy"; persist();
    toast("Mesa abierta: "+t.name,"ok");
  }
  if(t.status==="resv"){
    const r=S.reservations.find(r=>r.tableId===t.id&&r.status==="pending");
    if(r&&!confirm(`${t.name} está reservada para ${r.name} (${fmtTime(r.time)}). ¿Abrir igualmente?`)) return;
    if(r){r.status="seated";}
    const o=mkOrder(t.id); S.orders[o.id]=o; t.orderId=o.id; t.status="busy"; persist();
  }
  activeTableId=t.id; activeCat=S.menu[0]?.cat;
  renderComanda();
  openDrawer();
}

function renderComanda(){
  const t=S.tables.find(x=>x.id===activeTableId);
  const o=tableOrder(t);
  document.getElementById("drawerHead").innerHTML=`
    <div><div class="dt">${t.name}</div><div class="ds">${t.zone} · ${t.seats} pax · abierta hace ${minsSince(o.openedAt)}m</div></div>
    <button class="x" id="closeDrawer">${iconX()}</button>`;
  if(!S.menu.find(c=>c.cat===activeCat))activeCat=S.menu[0]?.cat;
  const cats=S.menu.map(c=>`<button class="${c.cat===activeCat?'active':''}" data-cat="${esc(c.cat)}">${esc(c.cat)}</button>`).join("");
  const cat=S.menu.find(c=>c.cat===activeCat);
  const menu=cat?cat.items.map(i=>i.off
    ?`<button class="menu-item" style="opacity:.45;cursor:not-allowed"><span class="mstation">agotado</span><div class="mn">${esc(i.name)}</div><div class="mp">${money(i.price)}</div></button>`
    :`<button class="menu-item" data-add="${i.id}">
     <span class="mstation">${cat.station==='barra'?'barra':'cocina'}</span>
     <div class="mn">${esc(i.name)}</div><div class="mp">${money(i.price)}</div></button>`).join(""):"";
  const lines=o.items.length? o.items.map(i=>`
    <div class="oline" data-line="${i.lid}">
      <div class="top">
        <span class="statebadge sb-${i.status}">${i.status}</span>
        <span class="onm">${esc(i.name)}</span>
        <div class="stepper">
          <button data-dec="${i.lid}">−</button><span class="q">${i.qty}</span><button data-inc="${i.lid}">+</button>
        </div>
        <span class="op">${money(i.price*i.qty)}</span>
      </div>
      <div class="noterow"><input class="noteinput" data-note="${i.lid}" placeholder="Nota (ej: sin cebolla, al punto…)" value="${esc(i.notes)}"></div>
    </div>`).join("") : `<div class="empty" style="padding:30px">${iconCart()}<p>Comanda vacía.<br>Añade productos del menú.</p></div>`;

  document.getElementById("drawerBody").innerHTML=`
    <div class="section-head"><h2>Menú</h2><div class="line"></div></div>
    <div class="cats">${cats}</div>
    <div class="menu-grid">${menu}</div>
    <div class="section-head" style="margin-top:22px"><h2>Comanda</h2><div class="line"></div></div>
    <div class="order-lines">${lines}</div>`;

  const total=orderTotal(o);
  document.getElementById("drawerFoot").innerHTML=`
    <div class="total-row grand"><span class="tl">Total</span><span class="tv">${money(total)}</span></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" id="sendKitchen" style="flex:1" ${o.items.some(i=>i.status==='nuevo')?'':'disabled'}>${iconSend()} Enviar a cocina</button>
      <button class="btn btn-primary" id="goCharge" style="flex:1" ${o.items.length?'':'disabled'}>${iconCard()} Cobrar</button>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost btn-sm" id="moveTable" style="flex:1">Cambiar de mesa</button>
      <button class="btn btn-bad btn-sm" id="cancelTable" style="flex:1">Cerrar sin cobrar</button>
    </div>`;

  // wire
  const db=document.getElementById("drawerBody"), df=document.getElementById("drawerFoot");
  document.getElementById("closeDrawer").onclick=closeDrawer;
  db.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{activeCat=b.dataset.cat;renderComanda();});
  db.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>addItem(b.dataset.add));
  db.querySelectorAll("[data-inc]").forEach(b=>b.onclick=()=>changeQty(b.dataset.inc,1));
  db.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>changeQty(b.dataset.dec,-1));
  db.querySelectorAll("[data-note]").forEach(inp=>{
    inp.onchange=()=>{setNote(inp.dataset.note,inp.value);};
  });
  document.getElementById("sendKitchen").onclick=sendToKitchen;
  document.getElementById("goCharge").onclick=()=>openBill(activeTableId);
  document.getElementById("cancelTable").onclick=cancelTable;
  document.getElementById("moveTable").onclick=openMoveTable;
}

function addItem(pid){
  if(!prodById(pid))return;
  const o=tableOrder(S.tables.find(x=>x.id===activeTableId));
  // si ya existe una línea 'nuevo' del mismo producto sin nota, incrementa
  const ex=o.items.find(i=>i.pid===pid&&i.status==="nuevo"&&!i.notes);
  if(ex)ex.qty++; else o.items.push(line(pid,1));
  persist(); renderComanda();
}
function changeQty(lid,d){
  const o=tableOrder(S.tables.find(x=>x.id===activeTableId));
  const it=o.items.find(i=>i.lid===lid); if(!it)return;
  it.qty+=d; if(it.qty<=0)o.items=o.items.filter(i=>i.lid!==lid);
  persist(); renderComanda();
}
function setNote(lid,val){
  const o=tableOrder(S.tables.find(x=>x.id===activeTableId));
  const it=o.items.find(i=>i.lid===lid); if(it){it.notes=val.trim(); persist();}
}
function sendToKitchen(){
  const t=S.tables.find(x=>x.id===activeTableId);
  const o=tableOrder(t);
  const sent=[];
  o.items.forEach(i=>{if(i.status==="nuevo"){i.status="preparando";i.createdAt=now();sent.push(i);}});
  persist(); renderComanda(); buildNav();
  if(sent.length)printComanda(t.name,sent); // impresión silenciosa (si el proveedor la activó)
  toast(sent.length?`${sent.length} línea(s) enviadas a cocina/barra`:"Nada nuevo que enviar", sent.length?"ok":"info");
}
function cancelTable(){
  const t=S.tables.find(x=>x.id===activeTableId);
  const o=tableOrder(t);
  if(o&&o.items.length&&!confirm("La comanda tiene líneas. ¿Cerrar la mesa sin cobrar?"))return;
  if(t.orderId){delete S.orders[t.orderId];}
  t.orderId=null; t.status="free";
  persist(); closeDrawer(); render();
  toast("Mesa cerrada sin cobro","info");
}

/* ---------------- Acciones: COCINA ---------------- */
function toggleLine(oid,lid){
  const o=S.orders[oid]; if(!o)return;
  const it=o.items.find(i=>i.lid===lid); if(!it)return;
  it.status = (it.status==="listo"||it.status==="servido")?"preparando":"listo";
  save(); buildNav();
}
function serveStation(oid,station){
  const o=S.orders[oid]; if(!o)return;
  o.items.filter(i=>i.station===station&&(i.status==="preparando"||i.status==="listo")).forEach(i=>i.status="servido");
  save(); buildNav();
  toast("Tickets marcados como servidos","ok");
}

function assignTable(rid){
  const r=S.reservations.find(x=>x.id===rid); if(!r)return;
  const fit=S.tables.filter(t=>t.status==="free"&&t.seats>=r.people);
  const pool=fit.length?fit:S.tables.filter(t=>t.status==="free");
  if(!pool.length){toast("No hay mesas libres","bad");return;}
  document.getElementById("drawerHead").innerHTML=`
    <div><div class="dt">Asignar mesa</div><div class="ds">${esc(r.name)} · ${r.people} pax · ${fmtTime(r.time)}</div></div>
    <button class="x" id="closeDrawer">${iconX()}</button>`;
  document.getElementById("drawerBody").innerHTML=`
    ${fit.length?"":`<div style="background:var(--soon-bg);border:1px solid var(--warn);border-radius:12px;padding:12px 14px;font-weight:700;font-size:13px;color:var(--soon-tx);margin-bottom:16px">Ninguna mesa libre tiene ${r.people} plazas — se muestran todas las libres.</div>`}
    <div class="menu-grid">${pool.map(t=>`<button class="menu-item" data-pick="${t.id}">
      <div class="mn">${t.name}</div><div class="mp">${t.zone} · ${t.seats} pax</div></button>`).join("")}</div>`;
  document.getElementById("drawerFoot").innerHTML=`<button class="btn btn-ghost" id="pickCancel" style="width:100%">Cancelar</button>`;
  document.getElementById("closeDrawer").onclick=closeDrawer;
  document.getElementById("pickCancel").onclick=closeDrawer;
  document.getElementById("drawerBody").querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>{
    const t=S.tables.find(x=>x.id===b.dataset.pick);
    if(!t||t.status!=="free"){toast("Mesa no disponible","bad");return;}
    r.tableId=t.id; t.status="resv";
    persist(); closeDrawer(); render();
    toast(`${t.name} reservada para ${r.name}`,"ok");

function seatReservation(rid){
  const r=S.reservations.find(x=>x.id===rid); if(!r||!r.tableId)return;
  const t=S.tables.find(x=>x.id===r.tableId); if(!t)return;
  r.status="seated"; t.status="busy";
  const o=mkOrder(t.id); S.orders[o.id]=o; t.orderId=o.id;
  persist(); current="sala"; render();
  activeTableId=t.id; activeCat=S.menu[0]?.cat; renderComanda(); openDrawer();
  toast(`${r.name} sentados en ${t.name}`,"ok");
}
function cancelReservation(rid){
  const r=S.reservations.find(x=>x.id===rid); if(!r)return;
  if(!confirm(`¿Cancelar la reserva de ${r.name}?`))return;
  r.status="cancelled";
  if(r.tableId){const t=S.tables.find(x=>x.id===r.tableId); if(t&&t.status==="resv")t.status="free";}
  save();
  toast("Reserva cancelada","info");
}

/* ---------------- Acciones: CAJA / COBRO ---------------- */
let billDiners=1;
function openBill(tid){
  const t=S.tables.find(x=>x.id===tid); const o=tableOrder(t);
  if(!o){toast("La mesa no tiene comanda","bad");return;}
  activeTableId=tid; billDiners=1;
  renderBill();
  openDrawer();
}
function renderBill(){
  const t=S.tables.find(x=>x.id===activeTableId); const o=tableOrder(t);
  const total=orderTotal(o);
  document.getElementById("drawerHead").innerHTML=`
    <div><div class="dt">Cobrar · ${t.name}</div><div class="ds">${o.items.length} líneas · ${o.items.reduce((n,i)=>n+i.qty,0)} artículos</div></div>
    <button class="x" id="closeDrawer">${iconX()}</button>`;
  const lines=o.items.map(i=>`<div class="oline"><div class="top">
      <span class="onm">${i.qty}× ${esc(i.name)}${i.notes?` <span style="color:var(--warn);font-size:12px">(${esc(i.notes)})</span>`:''}</span>
      <span class="op">${money(i.price*i.qty)}</span></div></div>`).join("");
  const diners=[1,2,3,4,5,6].map(n=>`<button class="${n===billDiners?'active':''}" data-diner="${n}">${n}</button>`).join("");
  const per=total/billDiners;
  document.getElementById("drawerBody").innerHTML=`
    <div class="section-head"><h2>Detalle</h2><div class="line"></div></div>
    <div class="order-lines">${lines}</div>
    <div class="section-head" style="margin-top:22px"><h2>Dividir cuenta</h2><div class="line"></div></div>
    <div class="split-diners">${diners}</div>
    ${billDiners>1?`<div class="split-result"><div class="per">${money(per)}</div><div class="lbl">por comensal (${billDiners} personas)</div></div>`:''}`;
  const vr=(parseFloat(ADMIN.business.vat)||0)/100, base=total/(1+vr);
  document.getElementById("drawerFoot").innerHTML=`
    <div class="total-row"><span class="tl">Base imponible</span><span class="tv">${money(base)}</span></div>
    <div class="total-row"><span class="tl">IVA (${ADMIN.business.vat}%)</span><span class="tv">${money(total-base)}</span></div>
    <div class="total-row grand"><span class="tl">Total</span><span class="tv">${money(total)}</span></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" id="payCash" style="flex:1">${iconCash()} Efectivo</button>
      <button class="btn btn-primary" id="payCard" style="flex:1">${iconCard()} Tarjeta</button>
    </div>`;
  document.getElementById("closeDrawer").onclick=closeDrawer;
  document.getElementById("drawerBody").querySelectorAll("[data-diner]").forEach(b=>b.onclick=()=>{billDiners=parseInt(b.dataset.diner);renderBill();});
  document.getElementById("payCash").onclick=()=>charge("efectivo");
  document.getElementById("payCard").onclick=()=>charge("tarjeta");
}
function charge(method){
  const t=S.tables.find(x=>x.id===activeTableId); const o=tableOrder(t);
  if(!o||!o.items.length){toast("La comanda está vacía — nada que cobrar","bad");return;}
  const s=sale(t.id,method,now(),o.items.map(i=>({...i})));
  S.sales.push(s);
  if(ADMIN.printer.enabled&&ADMIN.printer.receiptOnCharge)printHTML(ticketReceiptHTML(t.name,s.items,method));
  delete S.orders[t.orderId]; t.orderId=null; t.status="free";
  persist(); closeDrawer(); current="caja"; render();
  if(typeof CLOUD!=="undefined")CLOUD.sync(); // envía la venta a la nube (si está configurada)
  toast(`Cobrado ${money(s.total)} · ${method}`,"ok");
}

function openDrawer(){document.getElementById("scrim").classList.add("on");document.getElementById("drawer").classList.add("on");}
function closeDrawer(){document.getElementById("scrim").classList.remove("on");document.getElementById("drawer").classList.remove("on");activeTableId=null;}

document.addEventListener("keydown",e=>{
  const padOpen=document.getElementById("pinScrim").classList.contains("on");
  if(e.key==="Escape"){closePinPad();closeAdmin();closeDrawer();return;}
  if(padOpen){ // el PIN pad también acepta teclado físico
    if(/^[0-9]$/.test(e.key))pinKey(e.key);
    else if(e.key==="Backspace")pinKey("back");
    else if(e.key==="Enter")pinKey("ok");
    return;
  }
  if(e.ctrlKey&&e.altKey&&e.key.toLowerCase()==="a"){e.preventDefault();adminGate();} // acceso técnico
});

/* ============================================================
   ZONA TÉCNICA (oculta al cliente — solo proveedor)
   Acceso: mantener pulsado el logo ~2 s (táctil) o Ctrl+Alt+A.
   PIN por defecto: 1234 (cámbialo en el propio panel)
   ============================================================ */
const APP_VERSION="2.2.0";
const ADMIN_KEY="vortexpos.admin.v1";
const dcl=o=>JSON.parse(JSON.stringify(o));
const ADMIN_DEFAULTS={
  pin:"1234",
  client:{name:"Cliente demo",id:"VTX-0001",plan:"Pro",notes:""},
  business:{name:"vortexPOS Demo",ticketHeader:"",ticketFooter:"Gracias por su visita",vat:10},
  modules:{cocina:true,reservas:true,caja:true},
  printer:{enabled:false,autoOnSend:true,receiptOnCharge:false,width:80,copies:1},
  cloud:{url:"",licenseKey:""},  // vortexPOS Cloud (Fase 2): vacío = 100% local
  theme:"system",                // system | light | dark
  activation:{activated:false,accessId:"",businessName:"",at:0,mode:""} // mode: cloud | local
};
// Servidor por defecto: la app sale de fábrica apuntando a vortexPOS Cloud,
// así el cliente solo necesita su ID de acceso y su PIN.
const DEFAULT_CLOUD_URL = "https://vortexpos-cloud.onrender.com";
let ADMIN=loadAdmin();

function loadAdmin(){
  try{
    const raw=localStorage.getItem(ADMIN_KEY);
    if(raw){
      const a=JSON.parse(raw);
      const merged={...dcl(ADMIN_DEFAULTS),...a,
        client:{...ADMIN_DEFAULTS.client,...(a.client||{})},
        business:{...ADMIN_DEFAULTS.business,...(a.business||{})},
        modules:{...ADMIN_DEFAULTS.modules,...(a.modules||{})},
        printer:{...ADMIN_DEFAULTS.printer,...(a.printer||{})},
        cloud:{...ADMIN_DEFAULTS.cloud,...(a.cloud||{})},
        activation:{...ADMIN_DEFAULTS.activation,...(a.activation||{})}};
      // el teclado táctil solo escribe dígitos: un PIN no numérico dejaría fuera al proveedor
      if(!/^\d{4,8}$/.test(String(merged.pin))){
        merged.pin="1234";
        logErr("PIN guardado no válido (no numérico o longitud incorrecta) — restablecido a 1234");
      }
      return merged;
    }
  }catch(e){logErr("Config de administrador ilegible: "+e.message);}
  return dcl(ADMIN_DEFAULTS);
}
function persistAdmin(){try{localStorage.setItem(ADMIN_KEY,JSON.stringify(ADMIN));}catch(e){}}

/* ---------------- Tema: claro / oscuro / sistema ---------------- */
const _mqDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
function resolvedTheme(){
  const t = (ADMIN && ADMIN.theme) || "system";
  if(t === "light" || t === "dark") return t;
  return (_mqDark && _mqDark.matches) ? "dark" : "light";
}
function applyTheme(){
  const t = resolvedTheme();
  document.documentElement.setAttribute("data-theme", t);
  // La barra de estado del móvil acompaña al tema
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute("content", t === "dark" ? "#070b16" : "#0b1020");
}
// En modo "sistema", seguir los cambios del sistema operativo en vivo
if(_mqDark){
  const onChange = () => { if(((ADMIN&&ADMIN.theme)||"system") === "system") applyTheme(); };
  if(_mqDark.addEventListener) _mqDark.addEventListener("change", onChange);
  else if(_mqDark.addListener) _mqDark.addListener(onChange);
}
function moduleOn(viewId){return viewId==="sala"||ADMIN.modules[viewId]!==false;}
function applyAdmin(){
  document.title=(ADMIN.business.name||"vortexPOS")+" — vortexPOS";
  applyTheme();
  render();
}

/* ----- Acceso oculto (táctil): mantener pulsado el logo ~2 s ----- */
function setupBrandAccess(){

  const cancel=()=>{if(timer){clearTimeout(timer);timer=null;}};

function adminGate(){

/* ----- Teclado PIN táctil ----- */
let pinEntry="";
function openPinPad(){
  pinEntry="";
  const el=document.getElementById("pinPad");
  el.classList.remove("err");
  el.innerHTML=`
    <div class="pin-title">${iconShield()} Acceso técnico</div>
    <div class="pin-sub">Introduce el PIN de administrador</div>
    <div class="pin-dots" id="pinDots"></div>
    <div class="pin-grid">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-key="${n}">${n}</button>`).join("")}
      <button data-key="back" class="pin-aux">⌫</button>
      <button data-key="0">0</button>
      <button data-key="ok" class="pin-ok">${iconCheck()}</button>
    </div>
    <button class="pin-cancel" id="pinCancel">Cancelar</button>`;
  el.querySelectorAll("[data-key]").forEach(b=>b.onclick=()=>pinKey(b.dataset.key));
  document.getElementById("pinCancel").onclick=closePinPad;
  renderPinDots();
  document.getElementById("pinScrim").classList.add("on");
}
function closePinPad(){document.getElementById("pinScrim").classList.remove("on");pinEntry="";}
function renderPinDots(){
  const d=document.getElementById("pinDots"); if(!d)return;
  const n=Math.max(String(ADMIN.pin).length,pinEntry.length,4);
  d.innerHTML=Array.from({length:n},(_,i)=>`<span class="${i<pinEntry.length?'f':''}"></span>`).join("");
}
function pinKey(k){
  if(k==="back"){pinEntry=pinEntry.slice(0,-1);renderPinDots();return;}
  if(k==="ok"){checkPin();return;}
  if(/^[0-9]$/.test(k)&&pinEntry.length<8){
    pinEntry+=k; renderPinDots();
    if(pinEntry.length>=String(ADMIN.pin).length)checkPin(); // validación automática al completar
  }
}
function checkPin(){
  const pad=document.getElementById("pinPad");
  if(pinEntry===String(ADMIN.pin)){closePinPad();openAdminSafe();}
  else{
    pad.classList.remove("err");void pad.offsetWidth;pad.classList.add("err");
    pinEntry="";renderPinDots();toast("PIN incorrecto","bad");
  }
}
function openAdminSafe(){ // el panel nunca debe fallar en silencio
  try{openAdmin();}
  catch(e){
    logErr("Error al abrir el panel técnico: "+e.message);
    toast("Error al abrir el panel — usa Reparar datos o recarga la página","bad");
  }
}
document.getElementById("pinScrim").onclick=e=>{if(e.target.id==="pinScrim")closePinPad();};

/* ----- Panel ----- */
function openAdmin(){
  const a=ADMIN;
  const el=document.getElementById("adminPanel");
  el.innerHTML=`
  <div class="adm-head">

function saveAdmin(){
  const g=id=>document.getElementById(id);
  // valida el PIN ANTES de tocar nada: el teclado táctil solo puede escribir 4-8 dígitos
  const np=g("admPin").value.trim();
  if(np&&!/^\d{4,8}$/.test(np)){
    toast("El PIN debe tener de 4 a 8 dígitos (solo números)","bad");
    g("admPin").focus();
    return;
  }
  ADMIN.client={name:g("admClientName").value.trim(),id:g("admClientId").value.trim(),plan:g("admPlan").value,notes:g("admNotes").value.trim()};
  ADMIN.business={name:g("admBizName").value.trim()||"vortexPOS",ticketHeader:g("admTHead").value.trim(),ticketFooter:g("admTFoot").value.trim(),vat:clamp(parseFloat(g("admVat").value)||0,0,30)};
  ADMIN.modules={cocina:g("admModCocina").checked,reservas:g("admModReservas").checked,caja:g("admModCaja").checked};
  ADMIN.printer={enabled:g("admPrnOn").checked,autoOnSend:g("admPrnAuto").checked,receiptOnCharge:g("admPrnReceipt").checked,width:parseInt(g("admPrnWidth").value)||80,copies:clamp(parseInt(g("admPrnCopies").value)||1,1,3)};
  ADMIN.cloud={url:g("admCloudUrl").value.trim().replace(/\/$/,""),licenseKey:g("admCloudLic").value.trim()};
  ADMIN.theme=g("admTheme").value;
  if(np)ADMIN.pin=np;
  persistAdmin(); closeAdmin(); applyAdmin();
  CLOUD.reset(); CLOUD.sync(); // aplica la nueva config de nube al instante
  toast("Configuración guardada","ok");
}
function diagText(){
  const size=((localStorage.getItem(STORE_KEY)||"").length/1024).toFixed(1);
  const errs=ERRLOG.length?` · ⚠ ${ERRLOG.length} error(es) — último: ${ERRLOG[ERRLOG.length-1]}`:" · sin errores registrados";
  return `Diagnóstico: ${S.tables.length} mesas · ${Object.keys(S.orders).length} comandas abiertas · ${S.sales.length} ventas · ${S.reservations.length} reservas · ${size} KB en almacenamiento local · v${APP_VERSION}${errs}`;
}

/* ----- Mantenimiento ----- */
function repairData(){
  let n=0;
  S.orders=S.orders||{}; S.sales=S.sales||[]; S.reservations=S.reservations||[]; migrate(S);
  S.tables.forEach(t=>{
    if(t.orderId&&!S.orders[t.orderId]){t.orderId=null;if(t.status==="busy")t.status="free";n++;}
    if(t.status==="busy"&&!t.orderId){t.status="free";n++;}
    if(t.status==="resv"&&!S.reservations.some(r=>r.tableId===t.id&&r.status==="pending")){t.status=t.orderId?"busy":"free";n++;}
  });
  Object.keys(S.orders).forEach(oid=>{
    const o=S.orders[oid];
    const t=S.tables.find(x=>x.id===o.tableId);
    if(!t){delete S.orders[oid];n++;return;}
    if(t.orderId!==oid){
      if(!t.orderId&&t.status!=="resv"){t.orderId=oid;t.status="busy";n++;}
      else{delete S.orders[oid];n++;}
    }
  });
  persist();
  return n;
}
function exportBackup(){
  const payload={app:"vortexpos",version:APP_VERSION,exportedAt:new Date().toISOString(),data:S,admin:{...ADMIN,pin:undefined}};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="vortexpos-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  toast("Copia de seguridad exportada","ok");
}
function importBackup(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const p=JSON.parse(r.result);
      const data=(p.data&&p.data.tables)?p.data:(p.tables?p:null);
      if(!data)throw new Error("formato");
      S=data;
      if(p.admin){ADMIN={...ADMIN,...p.admin,pin:ADMIN.pin};persistAdmin();}
      repairData(); render();
      const d=document.getElementById("admDiag"); if(d)d.textContent=diagText();
      toast("Copia restaurada correctamente","ok");
    }catch(err){toast("Archivo de copia no válido","bad");}
  };
  r.readAsText(file); e.target.value="";
}
function wipeAll(){
  if(!confirm("Esto borra TODOS los datos del cliente en este dispositivo (mesas, ventas, configuración). ¿Continuar?"))return;
  if(!confirm("¿Seguro? Esta acción no se puede deshacer."))return;
  localStorage.removeItem(STORE_KEY); localStorage.removeItem(ADMIN_KEY); localStorage.removeItem(BAK_KEY);
  S=seed(); ADMIN=loadAdmin(); persist();
  closeAdmin(); current="sala"; applyAdmin();
  toast("Dispositivo restablecido de fábrica","info");
}

function printHTML(html,force){
  if(!ADMIN.printer.enabled&&!force)return;
  const w=parseInt(ADMIN.printer.width)||80;
  const f=document.createElement("iframe");
  f.setAttribute("aria-hidden","true");
  f.style.cssText="position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden";
  document.body.appendChild(f);
  const d=f.contentDocument;
  d.open();
  d.write(`<!doctype html><html><head><meta charset="utf-8"><title>ticket</title><style>
    @page{size:${w}mm auto;margin:3mm}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Courier New",ui-monospace,monospace;font-size:${w==58?"11px":"12px"};color:#000;width:${w-8}mm}
    .c{text-align:center}.b{font-weight:700}.big{font-size:1.25em}
    .hr{border-top:1px dashed #000;margin:6px 0}
    table{width:100%;border-collapse:collapse}
    td{vertical-align:top;padding:1px 0}
    .qty{width:26px;font-weight:700}
    .amt{text-align:right;white-space:nowrap}
    .note{font-size:.9em;padding-left:26px}
  </style></head><body>${html}</body></html>`);
  d.close();
  setTimeout(()=>{
    try{f.contentWindow.focus();f.contentWindow.print();}catch(e){}
    setTimeout(()=>f.remove(),2000);
  },80);
}

function ticketReceiptHTML(tableName,items,method){

  const vr=(parseFloat(b.vat)||0)/100, base=total/(1+vr);
  const rows=items.map(i=>`<tr><td class="qty">${i.qty}×</td><td>${esc(i.name)}</td><td class="amt">${money(i.price*i.qty)}</td></tr>`).join("");

    ${b.ticketHeader?`<div class="c">${esc(b.ticketHeader)}</div>`:""}

    <table>${rows}</table>

      <tr><td>Base imponible</td><td class="amt">${money(base)}</td></tr>

function printComanda(tableName,items){
  if(!(ADMIN.printer.enabled&&ADMIN.printer.autoOnSend))return;
  const copies=clamp(parseInt(ADMIN.printer.copies)||1,1,3);
  ["cocina","barra"].forEach(st=>{
    const its=items.filter(i=>i.station===st);
    if(!its.length)return;
    const html=ticketComandaHTML(tableName,st,its);
    for(let c=0;c<copies;c++)printHTML(html);
  });
}
