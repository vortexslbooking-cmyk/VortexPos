/* ---------------- Clock + auto-tick ---------------- */
function tickClock(){
  const d=new Date();
  document.getElementById("clock").innerHTML=
    d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0")
    +`<br><span style="font-size:10px;color:var(--muted)">${d.getDate().toString().padStart(2,"0")}/${(d.getMonth()+1).toString().padStart(2,"0")}</span>`;
}
function uiIdle(){ // no re-renderizar mientras el usuario tiene un cajón o el panel abiertos
  return !document.getElementById("drawer").classList.contains("on")
      && !document.getElementById("adminScrim").classList.contains("on")
      && !document.getElementById("pinScrim").classList.contains("on");
}
setInterval(()=>{ tickClock(); if(uiIdle()) render(); }, 30000);
document.addEventListener("visibilitychange",()=>{ if(!document.hidden&&uiIdle()){tickClock();render();} }); // al despertar la tablet, refresca temporizadores

/* ============================================================
   vortexPOS CLOUD — sincronización con el servidor central (Fase 2)
   Aditivo y offline-first: sin URL+licencia, la app funciona 100% local.
   PUSH: ventas, cierres y carta (si cambió) -> el proveedor lo ve en su panel.
   PULL: carta remota editada por el proveedor (Last-Write-Wins por fecha).
   Si no hay internet o la licencia está suspendida, la app NO se detiene.
   ============================================================ */
const CLOUD={
  token:null, syncing:false, lastOk:null,
  cfg(){ const c=ADMIN.cloud||{}; const url=(c.url||"").replace(/\/$/,""); const lic=(c.licenseKey||"").trim();
         return (url&&lic)?{url,lic}:null; },
  reset(){ this.token=null; },
  async _login(url,lic,pin){
    const r=await fetch(url+"/api/device/login",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({license_key:lic,pin:String(pin)})});
    return r;
  },
  async testConnection(url,lic,pin){
    try{
      const r=await this._login(url.replace(/\/$/,""),lic,pin);
      if(r.ok){const d=await r.json(); return {ok:true,name:d.tenant&&d.tenant.business_name};}
      if(r.status===403) return {ok:false,error:"Licencia suspendida o de baja"};
      return {ok:false,error:"Licencia o PIN incorrectos"};
    }catch(e){ return {ok:false,error:"No se pudo conectar (¿URL correcta? ¿internet?)"}; }
  },
  setStatus(state,text){ // state: ok | off | local | busy
    this.lastOk = state==="ok" ? Date.now() : this.lastOk;
    const pill=document.getElementById("cloudPill");
    if(!pill)return;
    const cfg=this.cfg();
    if(!cfg){ pill.style.display="none"; return; }
    pill.style.display="inline-flex";
    const col={ok:"var(--ok)",busy:"var(--warn)",off:"var(--muted)",local:"var(--muted)"}[state]||"var(--muted)";
    pill.querySelector(".dot").style.background=col;
    pill.querySelector("b").textContent=text||({ok:"Sincronizado",busy:"Sincronizando…",off:"Sin conexión"}[state]||"Nube");
  },
  async sync(manual,_retried){
    const cfg=this.cfg();
    if(!cfg){ this.setStatus("local"); return {ok:false,msg:"Modo local (sin nube configurada)"}; }
    if(this.syncing) return {ok:false,msg:"Ya sincronizando…"};
    this.syncing=true; this.setStatus("busy");
    try{
      if(!this.token){
        const lr=await this._login(cfg.url,cfg.lic,ADMIN.pin);
        if(lr.status===403){ this.syncing=false; this.setStatus("off","Licencia suspendida");
          if(manual)toast("Licencia suspendida — contacta con el proveedor","bad");
          return {ok:false,msg:"Licencia suspendida"}; }
        if(!lr.ok){ this.syncing=false; this.setStatus("off","Sin acceso");
          return {ok:false,msg:"Licencia o PIN incorrectos"}; }
        this.token=(await lr.json()).token;
      }
      // Solo se envían registros aún no confirmados por el servidor.
      // El botón manual "Sincronizar ahora" reenvía TODO (recuperación tras
      // un cambio de servidor o restauración de copia).
      const acked=S.cloudAcked||(S.cloudAcked={});
      const pending=[
        ...S.sales.map(s=>({kind:"sale",record_id:s.id,json:s,created_at:new Date(s.paidAt).toISOString()})),
        ...(S.closures||[]).map(c=>({kind:"closure",record_id:c.id,json:c,created_at:new Date(c.to).toISOString()}))
      ].filter(rec=>manual||!acked[rec.record_id]);
      const body={
        documents:{
          menu:  {json:S.menu, updated_at:new Date(S.menuUpdatedAt||Date.now()).toISOString()},
          config:{json:{vat:ADMIN.business.vat}, updated_at:new Date(S.menuUpdatedAt||Date.now()).toISOString()}
        },
        records:pending
      };
      const r=await fetch(cfg.url+"/api/sync",{method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+this.token},
        body:JSON.stringify(body)});
      if(r.status===401){ // token caducado: un único reintento con login fresco
        this.token=null; this.syncing=false;
        if(_retried){ this.setStatus("off","Sin acceso"); return {ok:false,msg:"El servidor rechaza la sesión"}; }
        return this.sync(manual,true);
      }
      if(r.status===403){ this.syncing=false; this.setStatus("off","Licencia suspendida");
        if(manual)toast("Licencia suspendida — contacta con el proveedor","bad");
        return {ok:false,msg:"Licencia suspendida"}; }
      if(!r.ok){ this.syncing=false; this.setStatus("off"); return {ok:false,msg:"Error del servidor"}; }
      const data=await r.json();
      // PULL: carta remota (solo si el servidor la tiene más reciente)
      let applied=false;
      const sm=data.documents&&data.documents.menu;
      if(sm&&Array.isArray(sm.json)){
        const serverTs=new Date(sm.updated_at).getTime();
        if(serverTs>(S.menuUpdatedAt||0)+1000){ // margen de 1s para evitar rebotes
          S.menu=sm.json; S.menuUpdatedAt=serverTs; applied=true;
          if(uiIdle())render();
          toast("Carta actualizada desde el proveedor","info");
        }
      }
      // Confirmados: no volver a enviarlos; poda entradas de registros ya archivados
      pending.forEach(rec=>{acked[rec.record_id]=1;});
      const vivos=new Set([...S.sales.map(s=>s.id),...(S.closures||[]).map(c=>c.id)]);
      Object.keys(acked).forEach(k=>{ if(!vivos.has(k)) delete acked[k]; });
      persist();
      this.syncing=false; this.setStatus("ok");
      return {ok:true,msg:`${pending.length} registro(s) enviados${applied?" · carta recibida":""}`};
    }catch(e){
      this.syncing=false; this.setStatus("off","Sin conexión");
      return {ok:false,msg:"Sin conexión — se reintentará"};
    }
  }
};
// disparadores: cada 60 s, al recuperar internet, y al volver a primer plano
setInterval(()=>{ CLOUD.sync(); }, 60000);
window.addEventListener("online",()=>CLOUD.sync());
document.addEventListener("visibilitychange",()=>{ if(!document.hidden)CLOUD.sync(); });

/* ============================================================
   ACCESO: activación del dispositivo (ID + PIN) y elección de camarero
   ------------------------------------------------------------
   1) Si el dispositivo no está activado -> pantalla de activación.
      El ID de acceso y el PIN los genera el proveedor; la app canjea
      esas credenciales por la licencia, que el cliente nunca ve.
   2) Si hay camareros dados de alta -> pantalla de "¿quién entra?".
   Una vez activado, la app abre sin internet: la activación se recuerda.
   ============================================================ */
const GATE = {
  el(){ return document.getElementById("gate"); },
  card(){ return document.getElementById("gateCard"); },
  show(){ this.el().classList.add("on"); },
  hide(){ this.el().classList.remove("on"); },
  logoSVG(){ return '<svg viewBox="0 0 24 24" fill="none"><path d="M4 4l6 16 2-6 2 6 4-16" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'; },

  /* ---- Paso 1: activación ---- */
  renderActivation(){
    this.card().innerHTML = `
      <div class="gate-logo">${this.logoSVG()}</div>
      <h1>vortexPOS</h1>
      <div class="sub">Introduce el <b>ID de acceso</b> y el <b>PIN</b><br>que te ha entregado tu proveedor</div>
      <div class="gate-field">
        <label>ID de acceso</label>
        <input id="gAccess" inputmode="text" autocapitalize="characters" autocomplete="off"
               maxlength="6" placeholder="A7K2M9">
      </div>
      <div class="gate-field">
        <label>PIN</label>
        <input id="gPin" type="password" inputmode="numeric" autocomplete="off"
               maxlength="8" placeholder="••••">
      </div>
      <button class="gate-btn" id="gGo">Activar dispositivo</button>
      <div class="gate-msg" id="gMsg"></div>
      <div class="gate-alt">¿Sin conexión o instalación local?
        <button id="gLocal">Activar en modo local</button></div>
      <div class="gate-foot">VORTEX S.L. · v${APP_VERSION}</div>`;
    this.show();
    const acc = document.getElementById("gAccess");
    const pin = document.getElementById("gPin");
    acc.oninput = () => { acc.value = acc.value.toUpperCase().replace(/[^A-Z0-9]/g,""); };
    pin.oninput = () => { pin.value = pin.value.replace(/\D/g,""); };
    const go = () => this.doActivate();
    document.getElementById("gGo").onclick = go;
    pin.addEventListener("keydown", e => { if(e.key === "Enter") go(); });
    acc.addEventListener("keydown", e => { if(e.key === "Enter") pin.focus(); });
    document.getElementById("gLocal").onclick = () => this.activateLocal();
    setTimeout(() => acc.focus(), 100);
  },

  msg(text, kind){
    const m = document.getElementById("gMsg");
    if(m){ m.className = "gate-msg " + (kind||""); m.textContent = text; }
  },

  async doActivate(){
    const acc = (document.getElementById("gAccess").value||"").trim().toUpperCase();
    const pin = (document.getElementById("gPin").value||"").trim();
    if(acc.length < 4) return this.msg("Escribe el ID de acceso completo","err");
    if(!/^\d{4,8}$/.test(pin)) return this.msg("El PIN son de 4 a 8 dígitos","err");
    const btn = document.getElementById("gGo");
    btn.disabled = true; this.msg("Conectando con el servidor…");
    const url = ((ADMIN.cloud && ADMIN.cloud.url) || DEFAULT_CLOUD_URL).replace(/\/$/,"");
    try{
      const r = await fetch(url + "/api/device/activate", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({access_id:acc, pin:pin})
      });
      if(r.status === 401){ btn.disabled=false; return this.msg("ID de acceso o PIN incorrectos","err"); }
      if(r.status === 403){ btn.disabled=false; return this.msg("Licencia suspendida — contacta con tu proveedor","err"); }
      if(!r.ok){ btn.disabled=false; return this.msg("El servidor no responde correctamente","err"); }
      const d = await r.json();
      // Queda activado: se guarda la licencia (invisible para el cliente) y el PIN
      ADMIN.cloud = { url:url, licenseKey:d.license_key };
      ADMIN.pin = pin;                                  // mismo PIN para el panel técnico
      if(d.tenant && d.tenant.business_name) ADMIN.business.name = d.tenant.business_name;
      ADMIN.activation = { activated:true, accessId:acc,
        businessName:(d.tenant&&d.tenant.business_name)||"", at:Date.now(), mode:"cloud" };
      persistAdmin();
      this.msg("✓ Dispositivo activado","ok");
      CLOUD.reset(); CLOUD.sync();
      setTimeout(() => { applyAdmin(); this.next(); }, 700);
    }catch(e){
      btn.disabled = false;
      this.msg("Sin conexión con el servidor. Revisa internet o usa el modo local.","err");
    }
  },

  // Instalación sin nube (demo/USB): la desbloquea el instalador con el PIN técnico
  activateLocal(){
    const pin = prompt("Modo local (sin nube)\nIntroduce el PIN de administrador:");
    if(pin === null) return;
    if(pin !== String(ADMIN.pin)) { this.msg("PIN de administrador incorrecto","err"); return; }
    ADMIN.activation = { activated:true, accessId:"LOCAL", businessName:"", at:Date.now(), mode:"local" };
    persistAdmin();
    this.msg("✓ Activado en modo local","ok");
    setTimeout(() => { applyAdmin(); this.next(); }, 500);
  },

  /* ---- Paso 2: quién entra (camarero) ---- */
  renderStaffPicker(){
    const staff = (S.staff||[]).filter(w => w.active !== false);
    this.card().innerHTML = `
      <div class="gate-logo">${this.logoSVG()}</div>
      <h1>${esc(ADMIN.business.name || "vortexPOS")}</h1>
      <div class="sub">¿Quién abre el turno?</div>
      <div class="staff-grid">
        ${staff.map(w => `
          <button class="staff-btn" data-staff="${w.id}">
            <span class="staff-ava" style="background:${staffColor(w)}">${esc(staffInitials(w.name))}</span>
            <span class="nm">${esc(w.name)}</span>
            <span class="rl">${w.pin ? "🔒 con PIN" : "sin PIN"}</span>
          </button>`).join("")}
      </div>
      <div class="gate-msg" id="gMsg"></div>
      <div class="gate-foot">VORTEX S.L. · v${APP_VERSION}</div>`;
    this.show();
    this.card().querySelectorAll("[data-staff]").forEach(b => {
      b.onclick = () => this.pickStaff(b.dataset.staff);
    });
  },

  pickStaff(id){
    // Solo camareros dados de alta y activos: si no, el turno quedaría "en el aire"
    const w = (S.staff||[]).find(x => x.id === id && x.active !== false);
    if(!w){ this.msg("Ese camarero ya no está activo","err"); return; }
    if(w.pin){
      const p = prompt(`PIN de ${w.name}:`);
      if(p === null) return;
      if(String(p) !== String(w.pin)) return this.msg("PIN incorrecto","err");
    }
    S.currentStaffId = w.id; persist();
    this.hide(); render();
    toast(`Turno abierto: ${w.name}`,"ok");
  },

  /* ---- Orquestador: decide qué pantalla toca ---- */
  next(){
    if(!(ADMIN.activation && ADMIN.activation.activated)){ this.renderActivation(); return false; }
    const staff = (S.staff||[]).filter(w => w.active !== false);
    if(staff.length && !currentStaff()){ this.renderStaffPicker(); return false; }
    this.hide(); render();
    return true;
  }
};

/* ---------------- Camareros ---------------- */
function currentStaff(){
  // Defensivo: seed() crea ventas de ejemplo cuando S aún se está construyendo
  if(!S || !S.currentStaffId) return null;
  return (S.staff||[]).find(w => w.id === S.currentStaffId && w.active !== false) || null;
}
function staffInitials(name){
  const p = String(name||"").trim().split(/\s+/);
  return ((p[0]||"?")[0] + (p[1] ? p[1][0] : "")).toUpperCase();
}
const STAFF_COLORS = ["#2563eb","#0891b2","#7c3aed","#db2777","#ea580c","#059669","#4f46e5","#b45309"];
function staffColor(w){
  const i = Math.abs(String(w.id||"").split("").reduce((a,c)=>a+c.charCodeAt(0),0)) % STAFF_COLORS.length;
  return w.color || STAFF_COLORS[i];
}
function switchStaff(){ GATE.renderStaffPicker(); }

/* ---------------- Robustez: errores globales visibles ---------------- */
window.addEventListener("error",e=>logErr(e.message||"Error desconocido"));
window.addEventListener("unhandledrejection",e=>logErr(String((e&&e.reason)||"Promesa rechazada")));

/* ---------------- Boot ---------------- */
setupBrandAccess(); // mantener pulsado el logo ~2 s → panel técnico
if(location.hash==="#reset-pin"){ // recuperación de acceso del proveedor
  ADMIN.pin="1234"; persistAdmin();
  history.replaceState(null,"",location.pathname+location.search);
  toast("PIN de administrador restablecido a 1234","info");
}
backupSnapshot(); // instantánea de arranque: red de seguridad ante corrupción de datos
tickClock();
applyTheme();     // el tema se aplica ANTES de pintar, para no parpadear
applyAdmin();
GATE.next();      // activación del dispositivo y/o elección de camarero
CLOUD.setStatus(CLOUD.cfg()?"busy":"local"); CLOUD.sync(); // primera sincronización si hay nube configurada
// PWA: registra el service worker SOLO cuando la app se sirve desde /app/ del
// servidor (https o localhost). Abierta como archivo, no hace nada.
if("serviceWorker" in navigator && /^https?:$/.test(location.protocol) && location.pathname.startsWith("/app")){
  navigator.serviceWorker.register("/app/sw.js").catch(e=>logErr("SW no registrado: "+e.message));
}
</script>
