name: Windows installer

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/windows/**"
      - "app/static/vortexpos.html"

jobs:
  installer:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/windows
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/windows/src-tauri

      - name: Usar la ultima version de la app
        run: cp ../../app/static/vortexpos.html www/index.html

      - name: Instalar Tauri CLI
        run: npm install

      - name: Generar iconos
        run: npx tauri icon assets/logo.png

      - name: Compilar instalador
        run: npx tauri build

      - name: Publicar instaladores
        uses: actions/upload-artifact@v4
        with:
          name: vortexPOS-windows-installer
          path: |
            apps/windows/src-tauri/target/release/bundle/nsis/*.exe
            apps/windows/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
