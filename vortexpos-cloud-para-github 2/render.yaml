# Despliegue de un clic en Render — https://render.com
# 1) Sube esta carpeta "server" a un repositorio de GitHub.
# 2) En Render: New > Blueprint > elige el repo. Render lee este archivo y crea todo:
#    el servicio web + una base de datos Postgres gestionada, ya conectados.
# 3) Cuando termine, entra en el panel en la URL que te da Render.

services:
  - type: web
    name: vortexpos-cloud
    runtime: docker
    plan: free                      # sube a "starter" cuando tengas clientes
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vortexpos-db
          property: connectionString
      - key: JWT_SECRET             # se genera una clave segura automáticamente
        generateValue: true
      - key: PROVIDER_EMAIL
        sync: false                 # lo defines tú en el panel de Render (tu email)
      - key: PROVIDER_PASSWORD
        sync: false                 # lo defines tú en el panel de Render (contraseña fuerte)

databases:
  - name: vortexpos-db
    plan: free                      # Postgres gestionado con copias automáticas
    databaseName: vortexpos
    postgresMajorVersion: "16"
